<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas 跳跃游戏</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #e2e8f0;
    }
    .wrapper {
      text-align: center;
    }
    canvas {
      border: 2px solid #94a3b8;
      border-radius: 10px;
      background: #0b1022;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    p { margin-top: 10px; opacity: 0.9; }
    kbd {
      padding: 2px 6px;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      background: #1f2937;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <canvas id="game" width="900" height="320"></canvas>
    <p>按 <kbd>空格</kbd> 跳跃，躲避障碍物。每秒得分 +1，失败后按 <kbd>R</kbd> 重开。</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const groundY = 260;
    const player = {
      x: 120,
      y: groundY - 48,
      w: 38,
      h: 48,
      vy: 0,
      gravity: 0.9,
      jumpPower: -16,
      onGround: true,
      color: '#38bdf8'
    };

    let obstacles = [];
    let obstacleTimer = 0;
    let obstacleGap = 90;
    let score = 0;
    let gameOver = false;

    function resetGame() {
      obstacles = [];
      obstacleTimer = 0;
      obstacleGap = 90;
      score = 0;
      gameOver = false;
      player.y = groundY - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    function spawnObstacle() {
      const h = 30 + Math.random() * 40;
      const w = 22 + Math.random() * 26;
      obstacles.push({
        x: canvas.width + 20,
        y: groundY - h,
        w,
        h,
        speed: 6 + Math.random() * 2
      });
    }

    function collides(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function update() {
      if (gameOver) return;

      player.vy += player.gravity;
      player.y += player.vy;

      if (player.y + player.h >= groundY) {
        player.y = groundY - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      obstacleTimer++;
      if (obstacleTimer >= obstacleGap) {
        obstacleTimer = 0;
        obstacleGap = Math.max(55, 80 + Math.floor(Math.random() * 60));
        spawnObstacle();
      }

      obstacles.forEach(ob => ob.x -= ob.speed);
      obstacles = obstacles.filter(ob => ob.x + ob.w > -10);

      for (const ob of obstacles) {
        if (collides(player, ob)) {
          gameOver = true;
          break;
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = '#0b1022';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#111a35';
      for (let i = 0; i < 6; i++) {
        const x = (i * 180 + (Date.now() / 30) % 180) % canvas.width;
        ctx.fillRect(x, 140 + (i % 2) * 14, 100, 10);
      }

      ctx.fillStyle = '#334155';
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
      ctx.fillStyle = '#475569';
      ctx.fillRect(0, groundY - 8, canvas.width, 8);
    }

    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(player.x + 24, player.y + 10, 8, 8);
    }

    function drawObstacles() {
      ctx.fillStyle = '#f43f5e';
      obstacles.forEach(ob => ctx.fillRect(ob.x, ob.y, ob.w, ob.h));
    }

    function drawUI() {
      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 24px Segoe UI';
      ctx.fillText(`分数: ${score}`, 24, 38);

      if (gameOver) {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f8fafc';
        ctx.textAlign = 'center';
        ctx.font = 'bold 42px Segoe UI';
        ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 18);
        ctx.font = '24px Segoe UI';
        ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 24);
        ctx.textAlign = 'left';
      }
    }

    function loop() {
      update();
      drawBackground();
      drawPlayer();
      drawObstacles();
      drawUI();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!gameOver && player.onGround) {
          player.vy = player.jumpPower;
          player.onGround = false;
        }
      }

      if ((e.key === 'r' || e.key === 'R') && gameOver) {
        resetGame();
      }
    });

    setInterval(() => {
      if (!gameOver) {
        score += 1;
      }
    }, 1000);

    resetGame();
    loop();
  </script>
</body>
</html>
